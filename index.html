const terminology = [
  { term: "Neat", definition: "No ice, room temperature spirit in a rocks glass. No chilling, no dilution.", example: "\"I'll have a Macallan 12, neat.\"" },
  { term: "On the Rocks", definition: "Served over ice in a rocks glass.", example: "\"Maker's Mark on the rocks, please.\"" },
  { term: "Up / Straight Up", definition: "Shaken or stirred with ice, then strained into a chilled glass — no ice in the glass.", example: "\"Martini, up.\" — Chilled but served without ice." },
  { term: "Twist", definition: "A lemon or orange peel expressed (squeezed) over the drink to release oils, then placed in or on the glass.", example: "\"Martini with a twist\" = lemon peel garnish." },
  { term: "Olives", definition: "Used in martinis. Always verify the number if the guest specifies.", example: "Standard is usually 1 or 3 olives." },
  { term: "With a Splash", definition: "A very small amount of a mixer added — soda, juice, etc.", example: "\"Bourbon with a splash of water.\"" },
  { term: "Dry", definition: "Less vermouth in a martini. The drier the martini, the less vermouth.", example: "\"Extra dry martini\" = very little or no vermouth." },
  { term: "Dirty", definition: "Olive brine added to a martini for salinity.", example: "\"Dirty martini\" = olive brine added. Glass may appear slightly cloudy." },
  { term: "Extra Dirty", definition: "More olive brine than a standard dirty martini.", example: "\"Extra dirty\" = noticeably salty and cloudy." },
  { term: "Tall", definition: "More mixer, served in a larger (highball) glass. Same amount of spirit.", example: "\"Vodka soda, tall\" = more soda, taller glass." },
  { term: "Back", definition: "A separate small glass served alongside the main drink.", example: "\"Whiskey with a water back\" = whiskey + a separate glass of water." },
  { term: "Float", definition: "A spirit or liqueur poured gently on top of a drink so it sits on the surface.", example: "\"Float of Grand Marnier\" on a margarita." },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function CocktailCard({ cocktail, flipped, onFlip }) {
  return (
    <div onClick={onFlip} className="cursor-pointer bg-base-200 rounded-xl p-5 hover:bg-base-300 transition-all border-2 border-transparent hover:border-primary/20">
      {!flipped ? (
        <div>
          <div className="flex items-center justify-between mb-2">
            <h3 className="font-bold text-lg">{cocktail.name}</h3>
            <span className={`badge badge-sm ${cocktail.category === 'signature' ? 'badge-primary' : 'badge-ghost'}`}>
              {cocktail.category === 'signature' ? '✨ Signature' : 'Classic'}
            </span>
          </div>
          <p className="text-sm text-base-content/60 italic mb-3">{cocktail.guestDescription}</p>
          <p className="text-xs text-primary/60">Tap to see details →</p>
        </div>
      ) : (
        <div>
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-bold text-lg">{cocktail.name}</h3>
            <span className="text-xs text-base-content/40">Tap to close</span>
          </div>
          <div className="grid grid-cols-1 gap-2 text-sm">
            <Detail label="Ingredients" value={cocktail.ingredients} />
            <Detail label="Glassware" value={cocktail.glassware} />

          <div className="mt-3 bg-warning/10 border border-warning/20 rounded-lg p-3">

            <p className="text-sm text-base-content/70">{cocktail.runnerNotes}</p>
          </div>
        </div>
      )}

  );
}

function CocktailGuide() {
  const [filter, setFilter] = useState('all');
  const [flipped, setFlipped] = useState(null);
  const filtered = cocktails.filter(c => filter === 'all' || c.category === filter);
  const classics = cocktails.filter(c => c.category === 'classic');
  const signatures = cocktails.filter(c => c.category === 'signature');

  return (
    <div className="max-w-2xl mx-auto">
      <div className="text-center mb-6">
        <div className="text-4xl mb-2">🍸</div>
        <h1 className="text-2xl font-bold">Cocktail Program</h1>
        <p className="text-base-content/60 mt-1">{cocktails.length} cocktails — tap any card to study</p>
      </div>
      <div className="flex gap-2 mb-5 justify-center">
        <button onClick={() => setFilter('all')} className={`btn btn-sm ${filter === 'all' ? 'btn-primary' : 'btn-ghost'}`}>All ({cocktails.length})</button>
        <button onClick={() => setFilter('classic')} className={`btn btn-sm ${filter === 'classic' ? 'btn-primary' : 'btn-ghost'}`}>Classics ({classics.length})</button>
        <button onClick={() => setFilter('signature')} className={`btn btn-sm ${filter === 'signature' ? 'btn-primary' : 'btn-ghost'}`}>Signatures ({signatures.length})</button>
      </div>
      <div className="flex flex-col gap-3">
        {filtered.map((cocktail) => (
          <CocktailCard
            key={cocktail.name}
            cocktail={cocktail}
            flipped={flipped === cocktail.name}
            onFlip={() => setFlipped(flipped === cocktail.name ? null : cocktail.name)}
          />
        ))}
      </div>
    </div>
  );
}

function TerminologyView() {
  const [revealed, setRevealed] = useState(new Set());
  const [showAll, setShowAll] = useState(false);

  const toggleReveal = (idx) => {
    setRevealed(prev => {
      const next = new Set(prev);
      if (next.has(idx)) next.delete(idx);
      else next.add(idx);
      return next;
    });
  };

  const toggleAll = () => {
    if (showAll) {
      setRevealed(new Set());
    } else {
      setRevealed(new Set(terminology.map((_, i) => i)));
    }
    setShowAll(!showAll);
  };

  return (
    <div className="max-w-2xl mx-auto">
      <div className="text-center mb-6">
        <div className="text-4xl mb-2">📖</div>
        <h1 className="text-2xl font-bold">Bar Terminology</h1>
        <p className="text-base-content/60 mt-1">Essential terms every service professional must know</p>
      </div>
      <div className="bg-base-200 rounded-xl p-4 mb-5">
        <p className="text-sm text-base-content/70">
          <strong>Study mode:</strong> Tap each term to reveal its definition. 
          Try to recall the meaning before tapping — this builds recall faster.
        </p>
        <button onClick={toggleAll} className="btn btn-ghost btn-sm mt-2">
          {showAll ? '🙈 Hide All' : '👁️ Show All'}
        </button>
      </div>
      <div className="flex flex-col gap-3">
        {terminology.map((term, idx) => {
          const isRevealed = revealed.has(idx);
          return (
            <div key={idx} onClick={() => toggleReveal(idx)} className="bg-base-200 rounded-xl p-4 cursor-pointer hover:bg-base-300 transition-colors">
              <div className="flex items-center justify-between">
                <h3 className="font-bold text-lg text-primary">{term.term}</h3>
                {!isRevealed && <span className="text-xs text-base-content/40">Tap to reveal</span>}
              </div>
              {isRevealed && (
                <div className="mt-2">
                  <p className="text-sm text-base-content/80">{term.definition}</p>
                  {term.example && (
                    <p className="text-sm text-base-content/50 italic mt-2 bg-base-300 rounded-lg px-3 py-2">
                      💬 {term.example}
                    </p>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function MenuItemCard({ item }) {
  const [expanded, setExpanded] = useState(false);
  const hasAllergens = item.allergens && item.allergens !== 'No major allergens';
  const allergenBadges = hasAllergens ? item.allergens.split(',').map(a => a.trim()).filter(Boolean) : [];

  return (
    <div onClick={() => setExpanded(!expanded)} className="bg-base-200 rounded-lg p-3 cursor-pointer hover:bg-base-300 transition-colors">
      <div className="flex items-start justify-between gap-2">
        <div className="flex-1">
          <h4 className="font-semibold text-sm">{item.name}</h4>
          {item.description && <p className="text-xs text-base-content/50 mt-0.5">{item.description}</p>}
        </div>
        {hasAllergens ? (
          <span className="badge badge-warning badge-xs shrink-0">⚠️</span>
        ) : (
          <span className="badge badge-success badge-xs shrink-0">✓</span>
        )}
      </div>
      {expanded && (
        <div className="mt-2 pt-2 border-t border-base-300">
          <div className="text-xs font-semibold text-base-content/50 uppercase tracking-wider mb-1">Allergens</div>
          {hasAllergens ? (
            <div className="flex flex-wrap gap-1">
              {allergenBadges.map((a, i) => (
                <span key={i} className="badge badge-warning badge-sm">{a}</span>
              ))}
            </div>
          ) : (
            <span className="badge badge-success badge-sm">No major allergens</span>
          )}
          {item.notes && <p className="text-xs text-base-content/50 mt-2 italic">{item.notes}</p>}
        </div>
      )}
    </div>
  );
}

  const activeMenu = menu === 'brunch' ? brunchMenu : dinnerMenu;

  activeMenu.forEach(item => {

  return (
    <div className="max-w-2xl mx-auto">
      <div className="text-center mb-6">
        <div className="text-4xl mb-2">🍽️</div>
        <h1 className="text-2xl font-bold">Menu Knowledge</h1>
        <p className="text-base-content/60 mt-1">Know every dish, every allergen, every detail</p>
      </div>
      <div className="bg-base-200 rounded-xl p-4 mb-5">
        <p className="text-sm text-base-content/70">
          <strong>Northport standard:</strong> You should be able to describe any dish from memory — 
          ingredients, preparation, and allergens. Tap any item to see allergen details.
        </p>
        <p className="text-xs text-base-content/50 mt-2">
          ⚠️ = Contains allergens &nbsp; ✓ = No major allergens
        </p>
      </div>
      <div className="flex gap-2 mb-5 justify-center">
        <button onClick={() => setMenu('dinner')} className={`btn btn-sm ${menu === 'dinner' ? 'btn-primary' : 'btn-ghost'}`}>🌙 Dinner Menu</button>
        <button onClick={() => setMenu('brunch')} className={`btn btn-sm ${menu === 'brunch' ? 'btn-primary' : 'btn-ghost'}`}>☀️ Brunch Menu</button>
      </div>
      <div className="text-sm text-base-content/40 mb-4">
        Executive Chef Michael Ross
        {menu === 'brunch' ? ' · Sat & Sun 11am – 1:45pm' : ' · Sun–Wed 4:30–9pm · Thu–Sat 4:30–10pm'}
      </div>
      {sections.map(section => (
        <div key={section} className="mb-6">
          <h3 className="font-bold text-base text-base-content/70 uppercase tracking-wider mb-3 border-b border-base-300 pb-1">
            {section}
          </h3>
          <div className="flex flex-col gap-2">
            {activeMenu.filter(i => i.section === section).map((item, idx) => (
              <MenuItemCard key={`${item.name}-${idx}`} item={item} />
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function generateQuestions() {
  const questions = [];

  // Cocktail glassware
  const glassTypes = [...new Set(cocktails.map(c => c.glassware))];
  cocktails.forEach(c => {
    const wrong = shuffle(glassTypes.filter(g => g !== c.glassware)).slice(0, 3);
    if (wrong.length >= 3) {
      const opts = shuffle([c.glassware, ...wrong]);
      questions.push({ question: `What glassware is used for a ${c.name}?`, options: opts, correctIndex: opts.indexOf(c.glassware), category: 'Cocktails' });
    }
  });

  // Cocktail garnish
  cocktails.forEach(c => {
    const otherGarnishes = shuffle(cocktails.filter(x => x.garnish !== c.garnish).map(x => x.garnish)).slice(0, 3);
    if (otherGarnishes.length >= 3) {
      const opts = shuffle([c.garnish, ...otherGarnishes]);
      questions.push({ question: `What is the garnish for a ${c.name}?`, options: opts, correctIndex: opts.indexOf(c.garnish), category: 'Cocktails' });
    }
  });

  // Cocktail ingredients
  cocktails.forEach(c => {
    const others = shuffle(cocktails.filter(x => x.name !== c.name).map(x => x.ingredients)).slice(0, 3);
    if (others.length >= 3) {
      const opts = shuffle([c.ingredients, ...others]);
      questions.push({ question: `What are the ingredients in a ${c.name}?`, options: opts, correctIndex: opts.indexOf(c.ingredients), category: 'Cocktails' });
    }
  });

  // Terminology
  terminology.forEach(t => {
    const others = shuffle(terminology.filter(x => x.term !== t.term).map(x => x.definition)).slice(0, 3);
    if (others.length >= 3) {
      const opts = shuffle([t.definition, ...others]);
      questions.push({ question: `What does "${t.term}" mean?`, options: opts, correctIndex: opts.indexOf(t.definition), category: 'Terminology' });
    }
  });

  // Northport standards
  forbesStandards.forEach(s => {
    const behavior = s.keyBehaviors[0];
    const otherBehaviors = shuffle(forbesStandards.filter(x => x.title !== s.title).flatMap(x => x.keyBehaviors)).slice(0, 3);
    if (otherBehaviors.length >= 3) {
      const opts = shuffle([behavior, ...otherBehaviors]);
      questions.push({ question: `Which behavior belongs to "${s.title}"?`, options: opts, correctIndex: opts.indexOf(behavior), category: 'Northport Standards' });
    }
  });

  // Allergen questions
  const allergenItems = dinnerMenu.filter(i => i.allergens && i.allergens !== 'No major allergens');
  allergenItems.slice(0, 10).forEach(item => {
    const others = shuffle(allergenItems.filter(x => x.allergens !== item.allergens).map(x => x.allergens)).slice(0, 3);
    if (others.length >= 3) {
      const opts = shuffle([item.allergens, ...others]);
      questions.push({ question: `What allergens does the ${item.name} contain?`, options: opts, correctIndex: opts.indexOf(item.allergens), category: 'Menu Knowledge' });
    }
  });

  return shuffle(questions);
}

function Quiz() {
  const [mode, setMode] = useState('setup');
  const [category, setCategory] = useState('all');
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [answered, setAnswered] = useState(false);
  const numQuestions = 10;

  const allQuestions = useMemo(() => generateQuestions(), []);
  const categories = ['all', ...new Set(allQuestions.map(q => q.category))];

  const startQuiz = () => {
    const pool = category === 'all' ? allQuestions : allQuestions.filter(q => q.category === category);
    setQuestions(shuffle(pool).slice(0, numQuestions));
    setCurrent(0);
    setScore(0);
    setSelected(null);
    setAnswered(false);
    setMode('active');
  };

  const handleSelect = (idx) => {
    if (answered) return;
    setSelected(idx);
    setAnswered(true);
    if (idx === questions[current].correctIndex) {
      setScore(s => s + 1);
    }
  };

  const nextQuestion = () => {
    if (current + 1 >= questions.length) {
      setMode('results');
    } else {
      setCurrent(c => c + 1);
      setSelected(null);
      setAnswered(false);
    }
  };

  if (mode === 'setup') {
    return (
      <div className="max-w-2xl mx-auto">
        <div className="text-center mb-6">
          <div className="text-4xl mb-2">✅</div>
          <h1 className="text-2xl font-bold">Test Your Knowledge</h1>
          <p className="text-base-content/60 mt-1">{numQuestions} questions from your training</p>
        </div>
        <div className="bg-base-200 rounded-xl p-5">
          <label className="text-sm font-semibold text-base-content/70 mb-3 block">Choose a category:</label>
          <div className="flex flex-wrap gap-2 mb-5">
            {categories.map(cat => (
              <button key={cat} onClick={() => setCategory(cat)} className={`btn btn-sm ${category === cat ? 'btn-primary' : 'btn-ghost'}`}>
                {cat === 'all' ? '🎯 All Topics' : cat}
              </button>
            ))}
          </div>
          <button onClick={startQuiz} className="btn btn-primary w-full">Start Quiz →</button>
        </div>
      </div>
    );
  }

  if (mode === 'results') {
    const pct = Math.round((score / questions.length) * 100);
    const emoji = pct >= 90 ? '🌟' : pct >= 70 ? '👏' : pct >= 50 ? '📚' : '💪';
    const message = pct >= 90
      ? 'Outstanding! True Northport material.'
      : pct >= 70
      ? 'Great work! A little more study and you\'re there.'
      : pct >= 50
      ? 'Good start! Review the modules and try again.'
      : 'Keep studying — you\'ll get there! Review the training modules.';

    return (
      <div className="max-w-2xl mx-auto text-center">
        <div className="text-6xl mb-4">{emoji}</div>
        <h1 className="text-2xl font-bold mb-2">Quiz Complete!</h1>
        <div className="text-5xl font-bold text-primary mb-2">{pct}%</div>
        <p className="text-base-content/60 mb-2">{score} of {questions.length} correct</p>
        <p className="text-base-content/70 mb-6">{message}</p>
        <div className="flex gap-3 justify-center">
          <button onClick={() => setMode('setup')} className="btn btn-primary">Try Again</button>
        </div>
      </div>
    );
  }

  const q = questions[current];
  return (
    <div className="max-w-2xl mx-auto">
      <div className="flex items-center justify-between mb-4">
        <span className="text-sm text-base-content/50">Question {current + 1} of {questions.length}</span>
        <span className="badge badge-primary badge-sm">{q.category}</span>
      </div>
      <progress className="progress progress-primary w-full mb-5" value={current + 1} max={questions.length}></progress>
      <div className="bg-base-200 rounded-xl p-5 mb-5">
        <h2 className="text-lg font-semibold mb-4">{q.question}</h2>
        <div className="flex flex-col gap-2">
          {q.options.map((opt, idx) => {
            let cls = 'btn btn-ghost bg-base-100 h-auto py-3 px-4 text-left justify-start font-normal';
            if (answered) {
              if (idx === q.correctIndex) cls = 'btn btn-success h-auto py-3 px-4 text-left justify-start font-normal text-white';
              else if (idx === selected && idx !== q.correctIndex) cls = 'btn btn-error h-auto py-3 px-4 text-left justify-start font-normal text-white';
            } else if (idx === selected) {
              cls = 'btn btn-primary h-auto py-3 px-4 text-left justify-start font-normal';
            }
            return (
              <button key={idx} className={cls} onClick={() => handleSelect(idx)}>
                <span className="text-sm leading-relaxed" style={{whiteSpace: 'normal'}}>{opt}</span>
              </button>
            );
          })}
        </div>
      </div>
      {answered && (
        <div className="flex justify-between items-center">
          <span className={`text-sm font-semibold ${selected === q.correctIndex ? 'text-success' : 'text-error'}`}>
            {selected === q.correctIndex ? '✓ Correct!' : '✗ Incorrect'}
          </span>
          <button onClick={nextQuestion} className="btn btn-primary btn-sm">
            {current + 1 >= questions.length ? 'See Results' : 'Next Question →'}
          </button>
        </div>
      )}
      <div className="text-center mt-4">
        <span className="text-sm text-base-content/40">Score: {score}/{current + (answered ? 1 : 0)}</span>
      </div>
    </div>
  );
}

// ============ MAIN APP ============

const navItems = [
  { id: 'home', icon: '🏠', label: 'Home' },
  { id: 'forbes', icon: '⭐', label: 'Northport Standards' },
  { id: 'cocktails', icon: '🍸', label: 'Cocktails' },
  { id: 'terminology', icon: '📖', label: 'Terminology' },
  { id: 'menus', icon: '🍽️', label: 'Menu' },
  { id: 'quiz', icon: '✅', label: 'Quiz' },
];

  return (
    <div className="min-h-screen bg-base-100 flex flex-col">
      <div className="sticky top-0 z-50 bg-base-100 border-b border-base-300">
        <div className="flex gap-1 p-2 overflow-x-auto scrollbar-none">
          {navItems.map(item => (
            <button
              key={item.id}
              onClick={() => navigate(item.id)}
              className={`btn btn-sm shrink-0 gap-1 ${section === item.id ? 'btn-primary' : 'btn-ghost'}`}
            >
              <span>{item.icon}</span>
              <span className="hidden sm:inline">{item.label}</span>
            </button>
          ))}
        </div>
      </div>
      <div className="flex-1 p-4 pb-8">
        {section === 'home' && <Welcome onNavigate={navigate} />}
        {section === 'forbes' && <ForbesStandardsView />}
        {section === 'cocktails' && <CocktailGuide />}
        {section === 'terminology' && <TerminologyView />}
        {section === 'menus' && <MenuGuide />}
        {section === 'quiz' && <Quiz />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
